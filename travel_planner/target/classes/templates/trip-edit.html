<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Edit Trip')}"></head>

<body>

<header th:replace="~{fragments/navbar :: navbar-auth}"></header>

<section class="form-section">

    <div class="form-card large">

        <h2>Edit Trip</h2>

        <form th:action="@{/trips/{id}/edit(id=${trip.id})}"
              th:object="${trip}"
              method="post">

            <div class="form-group">

                <label>Destination</label>

                <input type="text"
                       th:field="*{destination}">

                <small class="error"
                       th:errors="*{destination}">
                </small>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea rows="6"
                          th:field="*{description}">
                </textarea>

                <small class="error"
                       th:errors="*{description}">
                </small>

            </div>

            <div class="form-row">

                <div class="form-group">

                    <label>Start Date</label>

                    <input type="date"
                           th:field="*{startDate}">

                    <small class="error"
                           th:errors="*{startDate}">
                    </small>

                </div>

                <div class="form-group">

                    <label>End Date</label>

                    <input type="date"
                           th:field="*{endDate}">

                    <small class="error"
                           th:errors="*{endDate}">
                    </small>

                </div>

            </div>

            <button class="btn-primary">

                Save Changes

            </button>

        </form>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>

</html>
