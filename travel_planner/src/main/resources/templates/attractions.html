<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Manage Attractions')}"></head>

<body>

<header th:replace="~{fragments/navbar :: navbar-guest}"></header>

<section class="page-section">

    <div class="container">

        <div class="page-header">

            <h1>Manage Attractions</h1>

            <p>
                Add attractions that travelers can visit
                during the trip.
            </p>

        </div>

    </div>

</section>

<section class="form-section">

    <div class="form-card large">

        <h2>Add Attraction</h2>

        <form th:action="@{/attractions/create}"
              method="post">

            <div class="form-group">

                <label>Title</label>

                <input type="text"
                       name="title">

                <small class="error"
                       th:errors="*{title}">
                </small>

            </div>

            <div class="form-group">

                <label>Image URL</label>

                <input type="text"
                       name="imageUrl">

                <small class="error"
                       th:errors="*{imageUrl}">
                </small>

            </div>

            <div class="form-group">

                <label>Description</label>

                <textarea rows="5"
                          name="description">
                </textarea>

                <small class="error"
                       th:errors="*{description}">
                </small>

            </div>

            <button class="btn-primary">

                Add Attraction

            </button>

        </form>

    </div>

</section>

<section class="page-section">

    <div class="container">

        <h2>Current Attractions</h2>

        <div class="trip-grid">

            <div class="trip-card"
                 th:each="attraction : ${attractions}">

                <img th:src="${attraction.imageUrl}"
                     alt="Attraction">

                <h3 th:text="${attraction.title}">
                </h3>

                <p th:text="${attraction.description}">
                </p>

                <div class="action-buttons">

                    <a class="btn-secondary"
                       th:href="@{/attractions/{id}/edit(id=${attraction.id})}">

                        Edit

                    </a>

                    <form th:action="@{/attractions/{id}/delete(id=${attraction.id})}"
                          method="post">

                        <button class="btn-danger">

                            Delete

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>

</html>
