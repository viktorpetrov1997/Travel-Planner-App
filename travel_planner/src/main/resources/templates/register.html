<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Register')}"></head>

<body>

<header th:replace="~{fragments/navbar :: navbar-guest}"></header>

<section class="form-section">

    <div class="form-card">

        <h2>Create Account</h2>

        <form th:action="@{/register}"
              th:object="${userRegisterRequest}"
              method="post">

            <div class="form-group">

                <label>Username</label>

                <input type="text"
                       th:field="*{username}">

                <small class="error"
                       th:errors="*{username}">
                </small>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email"
                       th:field="*{email}">

                <small class="error"
                       th:errors="*{email}">
                </small>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password"
                       th:field="*{password}">

                <small class="error"
                       th:errors="*{password}">
                </small>

            </div>

            <button class="btn-primary">

                Register

            </button>

        </form>

    </div>

</section>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>

</html>
